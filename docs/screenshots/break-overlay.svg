<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Guga break overlay preview</title>
  <desc id="desc">Fullscreen green break overlay with centered countdown and resting Guga.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#12382b"/>
      <stop offset="1" stop-color="#1d7b55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#001a10" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="390" y="150" width="500" height="390" rx="30" fill="#f4fff9" filter="url(#shadow)"/>
  <text x="640" y="230" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#245742">Rest your eyes</text>
  <text x="640" y="328" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" fill="#12382b">1:00</text>
  <rect x="470" y="360" width="340" height="18" rx="9" fill="#d8f5e8"/>
  <rect x="470" y="360" width="260" height="18" rx="9" fill="#2da66f"/>
  <rect x="548" y="420" width="185" height="48" rx="18" fill="#fff"/>
  <text x="640" y="451" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#245742">End Break</text>
  <g transform="translate(92 366)">
    <ellipse cx="88" cy="115" rx="78" ry="76" fill="#33343a"/>
    <ellipse cx="88" cy="130" rx="52" ry="38" fill="#fff2df"/>
    <circle cx="88" cy="58" r="58" fill="#2e3036"/>
    <path d="M66 50 Q88 33 110 50 Q88 63 66 50Z" fill="#f4b336"/>
    <circle cx="65" cy="62" r="8" fill="#fff"/><circle cx="112" cy="62" r="8" fill="#fff"/>
    <circle cx="68" cy="63" r="3.5" fill="#101318"/><circle cx="109" cy="63" r="3.5" fill="#101318"/>
    <path d="M60 102 Q73 112 86 101" stroke="#221b1d" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M90 101 Q105 112 119 101" stroke="#221b1d" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M30 120 Q68 165 146 122" stroke="#33343a" stroke-width="26" fill="none" stroke-linecap="round"/>
    <ellipse cx="50" cy="188" rx="22" ry="13" fill="#f2b12f"/>
